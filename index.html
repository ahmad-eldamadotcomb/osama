<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltPro</title>
<style>
body{background:linear-gradient(135deg, #0f0c29, #302b63, #24243e);font-family:Arial;color:#fff;display:flex;justify-content:center;padding:20px}
.container{background:rgba(255,255,255,.05);border:1px solid #00e5ff;border-radius:25px;padding:25px;width:100%;max-width:500px}
h1{text-align:center;color:#00e5ff}
input{width:100%;padding:12px;margin:5px 0;background:#000;border:1px solid #00e5ff;border-radius:12px;color:#fff;box-sizing:border-box}
button{width:100%;padding:15px;margin-top:15px;background:linear-gradient(90deg,#00c6ff,#0072ff);border:none;border-radius:15px;color:#fff;font-size:18px;font-weight:700;cursor:pointer}
.btn-add{background:linear-gradient(90deg,#7F00FF,#E100FF)}
.subscriber{border:1px solid #ff00ff;padding:10px;border-radius:10px;margin-top:10px}
#result{margin-top:20px;padding:15px;background:rgba(0,255,0,.1);border:1px solid #00ff88;display:none}
.row{display:flex;gap:10px}
</style>
</head>
<body>
<div class="container">
<h1>⚡ VoltPro</h1>
<div class="row">
<div><label>سعر الكيلو</label><input type="number" id="price" value="0.65"></div>
<div><label>التاريخ</label><input type="date" id="date"></div>
</div>
<div class="row">
<div><label>السابقة</label><input type="number" id="prev" value="2874.1"></div>
<div><label>الحالية</label><input type="number" id="current" value="3000"></div>
</div>
<h2 style="color:#ff00ff;text-align:center">بيانات المشتركين</h2>
<div id="subscribers"></div>
<button class="btn-add" onclick="addSubscriber()">+ اضافة مشترك</button>
<button onclick="calculate()">احسب الفواتير</button>
<div id="result"></div>
</div>
<script>
let subCount=0;
function addSubscriber(){
  subCount++;
  document.getElementById('subscribers').innerHTML+=`<div class="subscriber"><label>اسم ${subCount}</label><input id="name${subCount}"><label>كيلوات</label><input type="number" id="kwh${subCount}"></div>`;
}
function calculate(){
  let price=+document.getElementById('price').value;
  let totalKwh=+document.getElementById('current').value - +document.getElementById('prev').value;
  let html=`<h3>الاجمالي: ${totalKwh} كيلو = ${(totalKwh*price).toFixed(2)} شيكل</h3><hr>`;
  for(let i=1;i<=subCount;i++){
    let name=document.getElementById(`name${i}`).value||`مشترك ${i}`;
    let kwh=+document.getElementById(`kwh${i}`).value||0;
    html+=`<p><b>${name}</b>: ${kwh} كيلو = ${(kwh*price).toFixed(2)} شيكل</p>`;
  }
  document.getElementById('result').innerHTML=html;
  document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
