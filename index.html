<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltPro - حفظ تلقائي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body{background:linear-gradient(135deg, #0f0c29, #302b63, #24243e);font-family:'Cairo';color:#fff;display:flex;justify-content:center;padding:20px}
.container{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid #00e5ff;border-radius:25px;padding:25px;width:100%;max-width:500px}
h1{text-align:center;color:#00e5ff;text-shadow:0 0 15px #00e5ff}
input{width:100%;padding:12px;margin:5px 0;background:rgba(0,0,0,.3);border:1px solid #00e5ff;border-radius:12px;color:#fff;box-sizing:border-box}
button{width:100%;padding:15px;margin-top:10px;background:linear-gradient(90deg,#00c6ff,#0072ff);border:none;border-radius:15px;color:#fff;font-size:18px;font-weight:700;cursor:pointer}
.btn-add{background:linear-gradient(90deg,#7F00FF,#E100FF)}
.subscriber{border:1px solid #ff00ff;padding:10px;border-radius:10px;margin-top:10px}
#result{margin-top:20px;padding:15px;background:rgba(0,255,0,.1);border:1px solid #00ff88;display:none;border-radius:15px}
.row{display:flex;gap:10px}
.history{background:rgba(0,0,0,.2);margin-top:15px;padding:10px;border-radius:10px;border:1px solid #00e5ff}
.history-item{border-bottom:1px dashed #00e5ff;padding:8px 0}
.del{float:left;background:red;color:#fff;border:none;border-radius:8px;padding:3px 8px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>⚡ VoltPro</h1>
<div class="row">
<div><label>سعر الكيلو</label><input type="number" id="price" value="0.65"></div>
<div><label>التاريخ</label><input type="date" id="date"></div>
</div>
<div class="row">
<div><label>السابقة</label><input type="number" id="prev" value="2874.1"></div>
<div><label>الحالية</label><input type="number" id="current" value="3000"></div>
</div>
<h2 style="color:#ff00ff;text-align:center">بيانات المشتركين</h2>
<div id="subscribers"></div>
<button class="btn-add" onclick="addSubscriber()">+ اضافة مشترك</button>
<button onclick="calculateAndSave()">احسب الفواتير</button>
<div id="result"></div>

<h2 style="color:#00e5ff;text-align:center">سجل الفواتير</h2>
<button onclick="clearHistory()" style="background:red">مسح كل السجل</button>
<div id="history" class="history"></div>

</div>
<script>
let subCount=0;

function addSubscriber(){
  subCount++;
  document.getElementById('subscribers').innerHTML+=`<div class="subscriber"><label>اسم ${subCount}</label><input id="name${subCount}" placeholder="اسم المشترك"><label>كيلوات</label><input type="number" id="kwh${subCount}" placeholder="0"></div>`;
}

function calculateAndSave(){
  let price=+document.getElementById('price').value;
  let date=document.getElementById('date').value;
  let prev=+document.getElementById('prev').value;
  let current=+document.getElementById('current').value;
  
  if(!price || !current){ alert("دخل سعر الكيلو والقراءة الحالية"); return; }
  if(!date){ alert("اختار التاريخ"); return; }
  
  let totalKwh=current - prev;
  let totalBill=totalKwh*price;
  let subs=[];
  let html=`<h3>تاريخ: ${date}</h3><h3>الاجمالي: ${totalKwh.toFixed(1)} كيلو = ${totalBill.toFixed(2)} شيكل</h3><hr>`;
  
  for(let i=1;i<=subCount;i++){
    let name=document.getElementById(`name${i}`).value||`مشترك ${i}`;
    let kwh=+document.getElementById(`kwh${i}`).value||0;
    subs.push({name,kwh,bill:(kwh*price).toFixed(2)})
    html+=`<p><b>${name}</b>: ${kwh} كيلو = ${(kwh*price).toFixed(2)} شيكل</p>`;
  }
  document.getElementById('result').innerHTML=html;
  document.getElementById('result').style.display='block';
  
  // الحفظ التلقائي هان
  let billData = {id:Date.now(), date, price, totalKwh, totalBill:totalBill.toFixed(2), subs}
  let bills = JSON.parse(localStorage.getItem('voltpro_bills')) || [];
  bills.push(billData);
  localStorage.setItem('voltpro_bills', JSON.stringify(bills));
  
  alert("تم حساب وحفظ الفاتورة ✅");
  loadHistory();
}

function loadHistory(){
  let bills = JSON.parse(localStorage.getItem('voltpro_bills')) || [];
  let html = '';
  bills.reverse().forEach(b=>{
    html += `<div class="history-item">
    <button class="del" onclick="deleteBill(${b.id})">حذف</button>
    <b>${b.date}</b> - الاجمالي: ${b.totalBill} شيكل<br>`;
    b.subs.forEach(s=> html += `${s.name}: ${s.bill} شيكل<br>`);
    html += `</div>`;
  })
  document.getElementById('history').innerHTML = html || "لا يوجد فواتير محفوظة";
}

function deleteBill(id){
  let bills = JSON.parse(localStorage.getItem('voltpro_bills')) || [];
  bills = bills.filter(b=> b.id != id);
  localStorage.setItem('voltpro_bills', JSON.stringify(bills));
  loadHistory();
}

function clearHistory(){
  if(confirm("متأكد بدك تمسح كل الفواتير؟")){
    localStorage.removeItem('voltpro_bills');
    loadHistory();
  }
}

loadHistory(); // يحمل السجل اول ما تفتح الصفحة
</script>
</body>
</html>
