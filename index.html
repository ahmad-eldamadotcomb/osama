<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltPro Pro</title>
<style>
body{background:#0a0a1a;color:#fff;font-family:'Arial';padding:10px}
.box{background:#141428;border:1px solid #00f5ff;border-radius:15px;padding:15px;margin:10px 0;box-shadow:0 0 10px #00f5ff33}
input,select{width:48%;padding:10px;margin:5px 1%;background:#0a0a1a;color:#fff;border:1px solid #00f5ff;border-radius:10px;text-align:center}
.btn{width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px;font-weight:bold;font-size:16px;cursor:pointer}
.btn1{background:linear-gradient(90deg,#a855f7,#ec4899)}
.btn2{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
.btn3{background:linear-gradient(90deg,#f97316,#ef4444)}
.btn4{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
.result{color:#22c55e;font-size:18px}
.debt{color:#ef4444;font-size:18px}
h3{color:#00f5ff}
</style>
</head>
<body>
<h2 style="text-align:center">⚡ VoltPro Pro</h2>

<div class="box">
<h3>البيانات الرئيسية</h3>
سعر الكيلو: <input type="number" id="price" value="27">
تاريخ الفاتورة: <input type="date" id="date">
القراءة السابقة: <input type="number" id="mainPrev">
القراءة الحالية: <input type="number" id="mainCurr">
</div>

<div id="users"></div>

<button class="btn btn1" onclick="addUser()">+ اضافة مشترك</button>
<button class="btn btn2" onclick="calc()">احسب الفاتورة</button>
<button class="btn btn3" onclick="nextWeek()">ترحيل للاسبوع القادم</button>
<button class="btn btn4" onclick="window.print()">طباعة 🖨️</button>

<div id="output" class="box"></div>

<script>
let users = [];
function addUser(){
  let id = users.length + 1;
  users.push({id});
  document.getElementById('users').innerHTML += `
  <div class="box">
    <h3>اسم المشترك ${id}</h3>
    <input type="text" id="name${id}" placeholder="الاسم">
    القراءة السابقة <input type="number" id="prev${id}">
    القراءة الحالية <input type="number" id="curr${id}">
    دفعة هذا الاسبوع <input type="number" id="pay${id}" value="0">
    تاريخ الدفعة <input type="date" id="payDate${id}">
    <div id="res${id}"></div>
  </div>`;
}

function calc(){
  let price = +document.getElementById('price').value;
  let mainTotal = (+document.getElementById('mainCurr').value) - (+document.getElementById('mainPrev').value);
  let usersTotal = 0; let data = [];
  
  for(let u of users){
    let use = (+document.getElementById('curr'+u.id).value) - (+document.getElementById('prev'+u.id).value);
    usersTotal += use; data.push({id:u.id,use});
  }
  
  let loss = mainTotal - usersTotal;
  let lossAbs = Math.abs(loss); // هنا سر التعديل - الفقد دايما موجب
  
  let html = `<h3>فاتورة ${document.getElementById('date').value}</h3>`;
  html += `الرئيسي: ${mainTotal.toFixed(1)}ك | الفرعي: ${usersTotal.toFixed(1)}ك | الفاقد: ${lossAbs.toFixed(1)}ك <hr>`;
  
  for(let d of data){
    let name = document.getElementById('name'+d.id).value;
    let pay = +document.getElementById('pay'+d.id).value || 0;
    let lossShare = usersTotal > 0 ? (d.use / usersTotal) * lossAbs : 0;
    let finalUse = d.use + lossShare; // الفقد بينضاف
    let bill = finalUse * price;
    let remain = bill - pay;
    let cls = remain >= 0 ? 'debt' : 'result';
    let txt = remain >= 0 ? `عليه: ${remain.toFixed(2)} ش` : `له رصيد: ${Math.abs(remain).toFixed(2)} ش`;
    html += `<b>${name}</b><br>استهلاك: ${d.use.toFixed(1)}ك + فقد: ${lossShare.toFixed(2)}ك = ${finalUse.toFixed(1)}ك<br>الفاتورة: ${bill.toFixed(2)} ش - دفعة: ${pay} ش = <span class="${cls}">${txt}</span><br><br>`;
    document.getElementById('res'+d.id).innerHTML = `<span class="${cls}">${txt}</span>`;
  }
  document.getElementById('output').innerHTML = html;
}

function nextWeek(){
  for(let u of users){
    document.getElementById('prev'+u.id).value = document.getElementById('curr'+u.id).value;
    document.getElementById('curr'+u.id).value = '';
    document.getElementById('pay'+u.id).value = 0;
    document.getElementById('res'+u.id).innerHTML = '';
  }
  document.getElementById('mainPrev').value = document.getElementById('mainCurr').value;
  document.getElementById('mainCurr').value = '';
  document.getElementById('output').innerHTML = '';
}
addUser();addUser();addUser();addUser();
</script>
</body>
</html>
